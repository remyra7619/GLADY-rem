<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Minecraft Карта мира | Полный обзор</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a2a1f;  /* тёмно-зелёный фон, ассоциирующийся с травой Minecraft */
            font-family: 'Minecraft', 'Segoe UI', 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Контейнер для всей карты с эффектом рамки, как у игрового стола */
        .map-container {
            background: #2b2b2b;
            padding: 12px;
            border-radius: 32px;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            border: 1px solid #5c5c3e;
        }

        /* Главный блок с изображением карты */
        .map-wrapper {
            position: relative;
            display: inline-block;
            line-height: 0;
            border-radius: 24px;
            overflow: hidden;
            background: #0a0f0a;
            box-shadow: inset 0 0 0 2px #7c6b3a, 0 0 0 4px #3a2a1a;
        }

        /* Сама карта — адаптивная и масштабируемая, с плавным увеличением при зуммировании браузера */
        .minecraft-map {
            display: block;
            width: 100%;
            height: auto;
            max-width: 1600px;     /* Ограничение, чтобы на огромных экранах не расплывалась, но можно убрать */
            min-width: 320px;
            cursor: zoom-in;
            transition: transform 0.2s ease;
            image-rendering: crisp-edges;    /* Для чёткости пиксельной графики */
            image-rendering: pixelated;
            image-rendering: crisp-edges;    
        }

        /* Подпись и элементы интерфейса в стиле Minecraft */
        .info-panel {
            margin-top: 28px;
            background: #1e1f1c;
            border-radius: 28px;
            padding: 16px 28px;
            backdrop-filter: blur(4px);
            background: rgba(30, 31, 28, 0.85);
            border: 2px solid #7c6b3a;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            text-align: center;
            font-weight: bold;
            color: #e0e0c0;
            letter-spacing: 1px;
        }

        .info-panel h1 {
            font-size: 2rem;
            font-weight: normal;
            text-shadow: 3px 3px 0 #1e3a1e;
            margin-bottom: 6px;
            font-family: 'Minecraft', monospace;
        }

        .info-panel p {
            font-size: 1rem;
            opacity: 0.9;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .badge {
            background: #2c2e24;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.9rem;
            border-left: 2px solid #f5c542;
            font-family: monospace;
        }

        .controls {
            margin-top: 24px;
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .mc-button {
            background: #3b3a2a;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-family: 'Minecraft', monospace;
            font-weight: bold;
            color: #f9f3c1;
            text-shadow: 1px 1px 0 #2b2a1a;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 4px 0 #1e1e12;
            font-size: 0.9rem;
        }

        .mc-button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #1e1e12;
        }

        .mc-button:hover {
            background: #5c5a3e;
            color: #fff2b5;
        }

        /* подсказка для мобильных устройств */
        .tooltip-zoom {
            background: #00000099;
            display: inline-block;
            margin-top: 12px;
            padding: 5px 12px;
            border-radius: 100px;
            font-size: 0.75rem;
            font-family: monospace;
            backdrop-filter: blur(8px);
        }

        /* адаптивность для планшетов и телефонов — карта остается большой, но вписывается */
        @media (max-width: 850px) {
            body {
                padding: 12px;
            }
            .map-container {
                padding: 8px;
            }
            .info-panel h1 {
                font-size: 1.5rem;
            }
            .controls {
                gap: 8px;
            }
            .mc-button {
                padding: 6px 14px;
                font-size: 0.75rem;
            }
        }

        /* плавный зум при нажатии на карту? добавим полноэкранный режим по клику */
        .fullscreen-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 5, 0.96);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            cursor: zoom-out;
            backdrop-filter: blur(10px);
        }

        .fullscreen-overlay.active {
            display: flex;
        }

        .fullscreen-img {
            max-width: 95vw;
            max-height: 95vh;
            object-fit: contain;
            box-shadow: 0 0 0 6px #5d6742, 0 20px 40px black;
            border-radius: 20px;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
        }

        /* закрытие по клику на крестик или фон */
        .close-fs {
            position: absolute;
            top: 30px;
            right: 40px;
            background: #2c2e24;
            color: #e9e2b3;
            font-size: 2rem;
            font-weight: bold;
            padding: 6px 18px;
            border-radius: 60px;
            cursor: pointer;
            font-family: monospace;
            border: 2px solid #b58d3a;
            transition: 0.1s;
        }

        .close-fs:hover {
            background: #5e4a2a;
        }

        footer {
            margin-top: 20px;
            font-size: 0.7rem;
            color: #b9b27a;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="map-container">
    <div class="map-wrapper">
        <!-- 
            ⚡ ВАЖНО: замените ссылку на изображение своей картой Minecraft.
            Положите файл карты (например map.png или map.jpg) в ту же папку, что и index.html,
            и укажите имя файла в src.
            Можно использовать прямую ссылку на изображение (например, "https://example.com/minecraft_map.jpg")
            Рекомендуемый формат: PNG, JPG, WEBP.
            Карта должна быть большой и детализированной.
        -->
        <img id="mainMap" class="minecraft-map" src="mini/news/image/map.png" alt="Большая карта мира Minecraft" 
             style="width:100%; height:auto;" loading="eager">
    </div>
</div>

<div class="info-panel">
    <h1>🗺️ КАРТА МИРА MINECRAFT</h1>
    <p>
        <span class="badge">🪓 Версия 1.20+</span>
        <span class="badge">🏔️ Биомы & Постройки</span>
        <span class="badge">🧭 Полный обзор</span>
    </p>
    <div class="controls">
        <button class="mc-button" id="zoomInBtn">🔍 Приблизить +</button>
        <button class="mc-button" id="zoomOutBtn">🔍 Отдалить -</button>
        <button class="mc-button" id="fullscreenBtn">🖼️ Во весь экран</button>
        <button class="mc-button" id="resetZoomBtn">⟳ Сбросить масштаб</button>
    </div>
    <div class="tooltip-zoom">
        💡 Совет: используй колесико мыши для масштабирования или кликни по карте для полноэкранного режима
    </div>
</div>
<footer>
    🧱 Карта создана выживальщиками • Наслаждайтесь исследованием!
</footer>

<!-- overlay для полноэкранного просмотра -->
<div id="fullscreenOverlay" class="fullscreen-overlay">
    <span class="close-fs" id="closeFsBtn">✕</span>
    <img id="fullscreenImg" class="fullscreen-img" src="" alt="Minecraft карта крупным планом">
</div>

<script>
    (function() {
        // Получаем элементы
        const mapImg = document.getElementById('mainMap');
        const fullscreenOverlay = document.getElementById('fullscreenOverlay');
        const fullscreenImgElem = document.getElementById('fullscreenImg');
        const zoomInBtn = document.getElementById('zoomInBtn');
        const zoomOutBtn = document.getElementById('zoomOutBtn');
        const resetZoomBtn = document.getElementById('resetZoomBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        // Переменные для отслеживания текущего масштаба (CSS transform)
        let currentScale = 1;
        const MIN_SCALE = 0.5;
        const MAX_SCALE = 4;
        const STEP = 0.2;

        // Применяем масштабирование к изображению (сохраняя центрирование)
        function applyScale(scale) {
            // Ограничиваем масштаб
            let newScale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, scale));
            currentScale = newScale;
            // применим transform-origin: top left? но лучше использовать transform: scale() с центром?
            // Чтобы масштаб шёл относительно центра картинки, зададим transform-origin: center
            mapImg.style.transformOrigin = 'center center';
            mapImg.style.transform = `scale(${currentScale})`;
            mapImg.style.transition = 'transform 0.1s ease';
        }

        // Сброс масштаба
        function resetScale() {
            applyScale(1);
        }

        // Увеличить
        function zoomIn() {
            applyScale(currentScale + STEP);
        }

        // Уменьшить
        function zoomOut() {
            applyScale(currentScale - STEP);
        }

        // Обработчик колесика мыши (zoom)
        function onWheel(event) {
            event.preventDefault();
            const delta = event.deltaY > 0 ? -STEP : STEP;
            let newScaleVal = currentScale + delta;
            newScaleVal = Math.min(MAX_SCALE, Math.max(MIN_SCALE, newScaleVal));
            if (newScaleVal !== currentScale) {
                applyScale(newScaleVal);
            }
        }

        // Блокируем наведение / привязываем событие колесика к контейнеру карты (удобнее)
        const mapWrapper = document.querySelector('.map-wrapper');
        if (mapWrapper) {
            mapWrapper.addEventListener('wheel', onWheel, { passive: false });
        }

        // Кнопки управления
        zoomInBtn.addEventListener('click', zoomIn);
        zoomOutBtn.addEventListener('click', zoomOut);
        resetZoomBtn.addEventListener('click', resetScale);

        // Полноэкранный режим: показываем overlay с большой картой (исходное изображение в высоком разрешении)
        function openFullscreen() {
            const imageSrc = mapImg.src;
            if (!imageSrc) {
                console.warn("Нет источника картинки!");
                return;
            }
            fullscreenImgElem.src = imageSrc;
            fullscreenOverlay.classList.add('active');
            // блокируем прокрутку body
            document.body.style.overflow = 'hidden';
        }

        function closeFullscreen() {
            fullscreenOverlay.classList.remove('active');
            document.body.style.overflow = '';
            // опционально очищаем src, чтобы не занимать память
            setTimeout(() => {
                if (!fullscreenOverlay.classList.contains('active')) {
                    // не трогаем источник, оставим как есть
                }
            }, 200);
        }

        fullscreenBtn.addEventListener('click', openFullscreen);
        // клик по overlay (задний фон) тоже закрывает полноэкранный режим
        fullscreenOverlay.addEventListener('click', function(e) {
            if (e.target === fullscreenOverlay || e.target.classList.contains('close-fs')) {
                closeFullscreen();
            }
        });
        // кнопка закрытия
        const closeBtn = document.getElementById('closeFsBtn');
        if (closeBtn) {
            closeBtn.addEventListener('click', closeFullscreen);
        }

        // Дополнительно: клик по самой карте (не в полноэкранном режиме) будет открывать полноэкранный просмотр? Это удобно.
        mapImg.addEventListener('click', function(e) {
            // Если пользователь хочет приблизить через клик - для удобства откроем полноэкранный режим карты.
            // Но также, чтобы не конфликтовать с масштабированием, всё же чаще пользователи хотят увеличить карту.
            // Сделаем вызов полноэкранного просмотра по клику на картинку.
            openFullscreen();
        });

        // Обработка динамической загрузки картинки (если src изменится или картинка перезагрузится)
        // поддержка случая, если картинка по умолчанию не загрузилась (отображаем placeholder-стиль)
        mapImg.onerror = function() {
            console.error("Ошибка загрузки карты! Проверьте путь к изображению (map.jpg или укажите корректную ссылку).");
            // Альтернативное сообщение на картинке (не обязательно, но украсим)
            mapImg.alt = "Ошибка загрузки карты Minecraft. Проверьте файл map.jpg";
            // можно добавить стиль, но оставим как есть, чтобы не портить интерфейс
            const wrapper = document.querySelector('.map-wrapper');
            if (wrapper && !wrapper.querySelector('.error-msg')) {
                const errDiv = document.createElement('div');
                errDiv.className = 'error-msg';
                errDiv.style.position = 'absolute';
                errDiv.style.top = '50%';
                errDiv.style.left = '50%';
                errDiv.style.transform = 'translate(-50%, -50%)';
                errDiv.style.background = '#2b1f0ecc';
                errDiv.style.color = '#ffbc6e';
                errDiv.style.padding = '16px';
                errDiv.style.borderRadius = '20px';
                errDiv.style.fontFamily = 'monospace';
                errDiv.style.textAlign = 'center';
                errDiv.style.backdropFilter = 'blur(8px)';
                errDiv.style.border = '2px solid #e1b34b';
                errDiv.innerHTML = '⚠️ Не удалось загрузить карту!<br>Поместите изображение "map.jpg" в папку с сайтом или измените src в коде.';
                wrapper.style.position = 'relative';
                wrapper.appendChild(errDiv);
            }
        };

        // Дополнительная функция: если картинка уже загрузилась, чистим возможные сообщения об ошибке
        mapImg.onload = function() {
            const existingError = document.querySelector('.error-msg');
            if (existingError) existingError.remove();
            // Убедимся, что масштаб сброшен к 1 при загрузке новой картинки (на всякий случай)
            resetScale();
        };

        // На случай если пользователь меняет вкладку или хочет сохранить масштабирование — всё ок.

        // Добавим поддержку кнопок с клавиатуры: Ctrl + "+" / "-" и возврат масштаба (дефолтное поведение браузера переопределим)
        window.addEventListener('keydown', function(e) {
            // Ctrl + "+" или просто "+" (без Ctrl, но с shift) на разных раскладках
            if (e.ctrlKey && (e.key === '+' || e.key === '=')) {
                e.preventDefault();
                zoomIn();
            } else if (e.ctrlKey && e.key === '-') {
                e.preventDefault();
                zoomOut();
            } else if (e.ctrlKey && e.key === '0') {
                e.preventDefault();
                resetScale();
            } else if (e.key === 'Escape' && fullscreenOverlay.classList.contains('active')) {
                closeFullscreen();
            }
        });

        // Инициализируем масштаб при загрузке страницы. Проверим, что картинка уже загружена
        if (mapImg.complete) {
            resetScale();
        } else {
            mapImg.addEventListener('load', resetScale);
        }

        // Определяем, поддерживает ли браузер динамический масштаб для touch (для мобильных, оставим как есть)
        // Адаптируем для сенсорных: двойной тап (double tap) открывает полноэкранный режим, но это уже есть через клик.
        // Добавим защиту от случайного зумирования всего документа при двойном тапе на карте.
        mapImg.addEventListener('dblclick', function(e) {
            e.preventDefault();
            openFullscreen();   // удобно: двойной клик открывает карту во весь экран.
        });

        // Дополнительная инструкция: если изображение изначально не отображается из-за пути, даём подсказку в консоли.
        if (mapImg.src && (mapImg.src.includes('map.jpg') && !mapImg.complete)) {
            console.log('‼️ Убедитесь что файл map.jpg лежит рядом с index.html. Если карта называется иначе — измените атрибут src у <img> с id="mainMap".');
        }

        // Мелкая косметика: добавим эффект курсора для карты
        mapImg.style.cursor = 'pointer';
        
        // Если потребуется добавить подсказку мета-тегов, чтобы сайт был адаптивным (viewport уже задан)
        console.log('Готово! Карта Minecraft загружена и готова к масштабированию.');
    })();
</script>

<!-- Небольшой блок с заменой шрифта 'Minecraft' на стандартные, если шрифт не установлен, но он и не критичен -->
</body>
</html>
